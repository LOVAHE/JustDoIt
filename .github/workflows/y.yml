name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python tmp_vpngate.py > vpngate-debug.txt 2>&1 || true
          ls -l /tmp/vpn* >> vpngate-debug.txt 2>&1 || true
      - run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add vpngate-debug.txt vpngate-nodes.txt 2>/dev/null || true; git commit -m vpngate-debug || true; git push
