name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: {deno-version: v2.x}
      - run: pip install -U 'yt-dlp[default]'
      - run: |
          : > ytdlp3.txt
          for c in default web_safari mweb tv android_vr ios; do
            echo "### $c" >> ytdlp3.txt
            if [ "$c" = default ]; then a=''; else a="--extractor-args youtube:player_client=$c"; fi
            yt-dlp --remote-components ejs:github --js-runtimes deno $a -F 'https://youtube.com/watch?v=hBAnXVEgWfM' >> ytdlp3.txt 2>&1 || true
          done
      - run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add ytdlp3.txt; git commit -m ytdlp3 || true; git push
