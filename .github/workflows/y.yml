name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq openvpn
      - run: |
          python tmp_vpngate.py > ovpn-debug.txt 2>&1 || true
          sudo timeout 30 openvpn --config /tmp/vpn-1.ovpn --verb 4 >> ovpn-debug.txt 2>&1 || true
          ip addr >> ovpn-debug.txt 2>&1 || true
      - if: always()
        run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add ovpn-debug.txt; git commit -m ovpn-debug || true; git push
