name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: {deno-version: v2.x}
      - run: pip install -U 'yt-dlp[default]'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq openvpn
      - run: |
          : > hls-measured-F0x12GzMnyY.txt
          python tmp_vpngate.py >> hls-measured-F0x12GzMnyY.txt 2>&1 || true
          for f in /tmp/vpn-*.ovpn; do
            sudo ip link delete tun0 2>/dev/null || true
            sudo openvpn --config "$f" > /tmp/ovpn.log 2>&1 & pid=$!
            up=0; for i in $(seq 1 30); do if ip link show tun0 >/dev/null 2>&1; then up=1; break; fi; sleep 1; done
            if [ "$up" != 1 ]; then sudo kill $pid 2>/dev/null || true; continue; fi
            src=$(ip -4 addr show tun0 | awk '/inet /{print $2}' | cut -d/ -f1)
            sudo ip route flush table 100 || true
            sudo ip route add table 100 default dev tun0
            sudo ip rule add priority 100 from "$src/32" table 100
            url=$(yt-dlp --source-address "$src" --remote-components ejs:github --js-runtimes deno --extractor-args 'youtube:player_client=web_safari' -f 301 -g 'https://youtube.com/watch?v=F0x12GzMnyY' 2>> hls-measured-F0x12GzMnyY.txt || true)
            echo "URL=$url" >> hls-measured-F0x12GzMnyY.txt
            curl --interface "$src" -L --max-time 30 -sS "$url" -o /tmp/p.m3u8
            URL="$url" python - <<'PY'
import os,re,urllib.parse
base=os.environ['URL']
lines=open('/tmp/p.m3u8').read().splitlines()
out=[]; dur=0; pending=None
for line in lines:
    if line.startswith('#EXTINF:'):
        pending=float(line.split(':',1)[1].split(',')[0])
    elif line and not line.startswith('#') and pending is not None:
        out.append((pending,urllib.parse.urljoin(base,line))); dur+=pending; pending=None
        if dur>=60: break
with open('/tmp/segs','w') as f:
    for d,u in out: f.write(f'{d}\t{u}\n')
print('segments',len(out),'duration',dur)
PY
            bytes=0; duration=0; n=0
            while IFS=$'\t' read -r d u; do
              n=$((n+1)); file=/tmp/s$n
              curl --interface "$src" -L --max-time 40 -sS "$u" -o "$file" || break
              b=$(stat -c%s "$file"); bytes=$((bytes+b)); duration=$(awk -v a="$duration" -v b="$d" 'BEGIN{print a+b}')
              echo "seg$n duration=$d bytes=$b" >> hls-measured-F0x12GzMnyY.txt
            done < /tmp/segs
            echo "total_bytes=$bytes total_duration=$duration" >> hls-measured-F0x12GzMnyY.txt
            awk -v s="$bytes" -v d="$duration" 'BEGIN{if(d>0) printf "measured_total_kbps=%.3f\n",s*8/d/1000}' >> hls-measured-F0x12GzMnyY.txt
            sudo ip rule del priority 100 2>/dev/null || true; sudo ip route flush table 100 || true
            sudo kill $pid 2>/dev/null || true; wait $pid 2>/dev/null || true; sudo ip link delete tun0 2>/dev/null || true
            break
          done
      - if: always()
        run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add hls-measured-F0x12GzMnyY.txt; git commit -m hls-measured-F0x12GzMnyY || true; git push