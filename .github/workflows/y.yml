name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: {deno-version: v2.x}
      - run: pip install -U 'yt-dlp[default]'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tor netcat-openbsd
      - run: |
          tor --SocksPort 9050 --ControlPort 9051 --CookieAuthentication 0 --DataDirectory /tmp/tor-data > /tmp/tor.log 2>&1 &
          for i in $(seq 1 60); do nc -z 127.0.0.1 9050 && break; sleep 1; done
          : > ytdlp-tor.txt
          for i in $(seq 1 6); do
            echo "### circuit $i" >> ytdlp-tor.txt
            yt-dlp --proxy socks5://127.0.0.1:9050 --remote-components ejs:github --js-runtimes deno -F 'https://youtube.com/watch?v=hBAnXVEgWfM' >> ytdlp-tor.txt 2>&1 || true
            printf 'AUTHENTICATE\r\nSIGNAL NEWNYM\r\nQUIT\r\n' | nc 127.0.0.1 9051 >/dev/null || true
            sleep 10
          done
          cat /tmp/tor.log >> ytdlp-tor.txt
      - run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add ytdlp-tor.txt; git commit -m tor || true; git push
