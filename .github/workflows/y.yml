name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: {deno-version: v2.x}
      - run: pip install -U 'yt-dlp[default]'
      - run: |
          mkdir -p clients; n=0
          for c in web_embedded visionos tv_downgraded tv_simply android web web_safari mweb; do
            n=$((n+1)); (echo "### $c"; yt-dlp --socket-timeout 20 --retries 1 --remote-components ejs:github --js-runtimes deno --extractor-args "youtube:player_client=$c;player_skip=webpage,configs" -F 'https://youtube.com/watch?v=hBAnXVEgWfM' || true) > "clients/$n" 2>&1 &
          done
          wait; cat clients/* > ytdlp4.txt
      - run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add ytdlp4.txt; git commit -m ytdlp4 || true; git push
