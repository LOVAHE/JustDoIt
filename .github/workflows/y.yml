name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: {deno-version: v2.x}
      - run: pip install -U 'yt-dlp[default]'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq openvpn
      - run: python tmp_vpngate.py
      - run: |
          : > vpngate.txt; cat vpngate-nodes.txt >> vpngate.txt
          for f in /tmp/vpn-*.ovpn; do
            echo "### $f" >> vpngate.txt
            echo route-nopull | sudo tee -a "$f" >/dev/null
            sudo pkill openvpn || true
            sudo ip link delete tun0 2>/dev/null || true
            sudo openvpn --config "$f" --daemon --log /tmp/ovpn.log || true
            up=0; for i in $(seq 1 25); do if ip link show tun0 >/dev/null 2>&1; then up=1; break; fi; sleep 1; done
            if [ "$up" != 1 ]; then cat /tmp/ovpn.log >> vpngate.txt; continue; fi
            for h in www.youtube.com youtube.com youtubei.googleapis.com www.googleapis.com i.ytimg.com; do
              for ip in $(getent ahostsv4 "$h" | awk '{print $1}' | sort -u); do sudo ip route replace "$ip/32" dev tun0 || true; done
            done
            curl -sS --max-time 15 https://www.youtube.com/robots.txt | head -1 >> vpngate.txt || true
            if yt-dlp --socket-timeout 25 --retries 1 --remote-components ejs:github --js-runtimes deno -F 'https://youtube.com/watch?v=hBAnXVEgWfM' >> vpngate.txt 2>&1; then break; fi
          done
          sudo pkill openvpn || true
      - run: git config user.name bot; git config user.email bot@users.noreply.github.com; git add vpngate.txt vpngate-nodes.txt; git commit -m vpngate || true; git push
