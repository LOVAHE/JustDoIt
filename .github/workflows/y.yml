name: y
on:
  push:
    paths: ['.github/workflows/y.yml']
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, reopened]
permissions: {contents: write}
jobs:
  x:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --quiet lief
      - run: |
          set +e
          mkdir -p .tmp/ipa-audit
          U='https://archive.org/download/com.google.ios.youtube-21.21.03-Decrypted/com.google.ios.youtube-21.21.03-Decrypted.ipa'
          M='https://archive.org/metadata/com.google.ios.youtube-21.21.03-Decrypted'
          curl -A 'Mozilla/5.0' -L --fail --retry 5 --retry-all-errors --connect-timeout 30 --max-time 2400 "$U" -o /tmp/youtube.ipa > .tmp/ipa-audit/audit.log 2>&1
          echo "curl_ipa_exit=$?" >> .tmp/ipa-audit/audit.log
          curl -A 'Mozilla/5.0' -L --fail --retry 5 --retry-all-errors --connect-timeout 30 --max-time 300 "$M" -o /tmp/meta.json >> .tmp/ipa-audit/audit.log 2>&1
          echo "curl_metadata_exit=$?" >> .tmp/ipa-audit/audit.log
          ls -lh /tmp/youtube.ipa /tmp/meta.json >> .tmp/ipa-audit/audit.log 2>&1
          file /tmp/youtube.ipa >> .tmp/ipa-audit/audit.log 2>&1
          python tools/audit_ios_ipa.py /tmp/youtube.ipa /tmp/meta.json .tmp/ipa-audit/report.md >> .tmp/ipa-audit/audit.log 2>&1
          echo "audit_exit=$?" >> .tmp/ipa-audit/audit.log
          rm -rf .tmp/ipa-audit/extracted /tmp/youtube.ipa /tmp/meta.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-audit
          path: .tmp/ipa-audit/
          if-no-files-found: warn
      - if: always() && github.event_name != 'pull_request'
        run: |
          git config user.name bot
          git config user.email bot@users.noreply.github.com
          git add .tmp/ipa-audit/report.md .tmp/ipa-audit/audit.log
          git commit -m ipa-audit || true
          git push
